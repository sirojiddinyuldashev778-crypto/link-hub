<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Spoon Gallery | Pro Version</title>

    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color-1: #F9F7F2; /* Very light beige */
            --bg-color-2: #FFFFFF; /* Pure white */
            --text-main: #2C3034; /* Dark refined grey */
            --text-sub: #6C757D;
            --accent-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.7);
            --btn-hover-bg: #FFFFFF;
        }

        body {
            /* Fallback to system fonts if SF Pro isn't available to maintain Apple feel */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* Floating Background Effect */
        .floating-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .float-svg {
            position: absolute;
            fill: none;
            stroke: var(--accent-gold);
            stroke-width: 1;
            opacity: 0.15; /* Delicate */
            filter: drop-shadow(0 4px 6px rgba(212, 175, 55, 0.1));
            will-change: transform;
        }

        @keyframes floatSlow1 {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, -40px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes floatSlow2 {
            0% { transform: translate(0, 0) rotate(20deg); }
            50% { transform: translate(-30px, 30px) rotate(-10deg); }
            100% { transform: translate(0, 0) rotate(20deg); }
        }

        .bg-spoon { top: 15%; left: 10%; width: 120px; animation: floatSlow1 25s infinite ease-in-out; }
        .bg-fork { bottom: 15%; right: 10%; width: 140px; animation: floatSlow2 30s infinite ease-in-out; }

        /* Main Container */
        .hub-container {
            width: 100%;
            max-width: 480px;
            z-index: 10;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2rem;
            box-shadow: var(--glass-shadow);
            text-align: center;
        }

        /* Profile Area */
        .profile-img-wrap {
            width: 110px;
            height: 110px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
            border: 1px solid var(--glass-border);
        }
        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .status-text {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 400;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        /* Link Buttons */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hub-link {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--btn-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            text-decoration: none;
            padding: 1.1rem 1.5rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .hub-link:hover {
            transform: scale(1.03) translateY(-2px);
            background: var(--btn-hover-bg);
            color: var(--text-main);
            box-shadow: 0 15px 25px rgba(0,0,0,0.06);
            border-color: #fff;
        }

        .hub-link i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
            color: var(--accent-gold);
            transition: transform 0.3s ease;
        }

        .hub-link:hover i {
            transform: scale(1.15);
        }

        /* Delay utilities for Animate.css */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .glass-card {
                padding: 2.5rem 1.5rem;
                border-radius: 28px;
            }
            .hub-link {
                padding: 1rem 1.2rem;
                font-size: 1rem;
            }
            .hub-link i {
                left: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Background -->
    <div class="floating-bg">
        <!-- Fork Silhouette -->
        <svg class="float-svg bg-fork" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 2C11 1.44772 11.4477 1 12 1C12.5523 1 13 1.44772 13 2V9C13 10.3661 12.183 11.5422 11 11.916V22C11 22.5523 11.4477 23 12 23C12.5523 23 13 22.5523 13 22V11.916C11.817 11.5422 11 10.3661 11 9V2Z" fill="currentColor"/>
            <path d="M15 2C15 1.44772 15.4477 1 16 1C16.5523 1 17 1.44772 17 2V6C17 7.65685 15.6569 9 14 9V11C16.7614 11 19 8.76142 19 6V2C19 1.44772 18.5523 1 18 1C17.4477 1 17 1.44772 17 2V6C17 6.55228 16.5523 7 16 7C15.4477 7 15 6.55228 15 6V2Z" fill="currentColor"/>
            <path d="M9 2C9 1.44772 8.55228 1 8 1C7.44772 1 7 1.44772 7 2V6C7 7.65685 8.34315 9 10 9V11C7.23858 11 5 8.76142 5 6V2C5 1.44772 5.44772 1 6 1C6.55228 1 7 1.44772 7 2V6C7 6.55228 7.44772 7 8 7C8.55228 7 9 6.55228 9 6V2Z" fill="currentColor"/>
        </svg>
        
        <!-- Spoon Silhouette -->
        <svg class="float-svg bg-spoon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1C15 1 17 3.5 17 6.5C17 9.5 13 11 13 12V22C13 22.5523 12.5523 23 12 23C11.4477 23 11 22.5523 11 22V12C11 11 7 9.5 7 6.5C7 3.5 9 1 12 1Z" fill="currentColor"/>
        </svg>
    </div>

    <!-- Main Content -->
    <div class="hub-container">
        <div class="glass-card animate__animated animate__zoomIn">
            
            <!-- Profile Info -->
            <div class="profile-area">
                <div class="profile-img-wrap">
                    <img src="logo.png" alt="Ali Spoon Logo" onerror="this.src='https://ui-avatars.com/api/?name=Ali+Spoon&background=E3C58D&color=fff&size=200'">
                </div>
                <h1 class="brand-title">Ali Spoon Gallery</h1>
                <p class="status-text">Premium oshxona anjomlari markazi | Abu Saxiy</p>
            </div>

            <!-- Links Area -->
            <div class="links-wrapper">
                
                <a href="#" class="hub-link animate__animated animate__fadeInUp delay-1">
                    <i class="fas fa-folder-open"></i>
                    Raqamli Katalog
                </a>
                
                <a href="https://t.me/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-2">
                    <i class="fab fa-telegram-plane"></i>
                    Telegram orqali buyurtma
                </a>
                
                <a href="https://instagram.com/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-3">
                    <i class="fab fa-instagram"></i>
                    Instagram Galereya
                </a>
                
                <a href="https://maps.google.com/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-4">
                    <i class="fas fa-map-marker-alt"></i>
                    Bizning manzil
                </a>
                
                <a href="tel:+998901234567" class="hub-link animate__animated animate__fadeInUp delay-5">
                    <i class="fas fa-headset"></i>
                    Menejer bilan bog'lanish
                </a>
                
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
