<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Spoon Gallery | Premium Cutlery</title>

    <!-- System Fonts for Apple aesthetic & Playfair for title -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f5f5f7; /* Apple classic gray */
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            --btn-bg: #ffffff;
            --btn-hover-bg: #fcfcfc;
            --btn-border: #d2d2d7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Main Container */
        .hub-container {
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 4rem;
            box-shadow: var(--glass-shadow);
        }

        /* Left Side: Profile Area */
        .profile-area {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .profile-img-wrap {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: #fff;
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
        }
        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .status-text {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 400;
            margin-bottom: 0;
            line-height: 1.6;
        }

        /* Right Side: Link Buttons */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            justify-content: center;
            height: 100%;
            padding-left: 2rem;
            border-left: 1px solid rgba(0,0,0,0.05);
        }

        .hub-link {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-main);
            text-decoration: none;
            padding: 1.2rem 1.5rem;
            border-radius: 18px;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        .hub-link:hover {
            transform: scale(1.02);
            background: var(--btn-hover-bg);
            color: var(--text-main);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border-color: #c7c7cc;
        }

        .hub-link i {
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
            color: var(--accent-gold);
        }

        /* Delay utilities for Animate.css */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .glass-card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
            .profile-area {
                margin-bottom: 2.5rem;
            }
            .links-wrapper {
                padding-left: 0;
                border-left: none;
            }
            .profile-img-wrap {
                width: 110px;
                height: 110px;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .hub-link {
                padding: 1.1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <div class="hub-container">
        <div class="glass-card animate__animated animate__fadeInUp">
            
            <div class="row align-items-center">
                <!-- Left Column: Profile -->
                <div class="col-md-5">
                    <div class="profile-area">
                        <div class="profile-img-wrap">
                            <img src="logo.png" alt="Ali Spoon Logo" onerror="this.src='https://ui-avatars.com/api/?name=Ali+Spoon&background=f5f5f7&color=D4AF37&size=200'">
                        </div>
                        <h1 class="brand-title">Ali Spoon Gallery</h1>
                        <p class="status-text">Premium oshxona anjomlari markazi | Abu Saxiy</p>
                    </div>
                </div>

                <!-- Right Column: Links -->
                <div class="col-md-7 mt-4 mt-md-0">
                    <div class="links-wrapper">
                        
                        <a href="#" class="hub-link animate__animated animate__fadeInRight delay-1">
                            <i class="fas fa-folder-open"></i>
                            Raqamli Katalog
                        </a>
                        
                        <a href="https://t.me/" target="_blank" class="hub-link animate__animated animate__fadeInRight delay-2">
                            <i class="fab fa-telegram-plane"></i>
                            Telegram orqali buyurtma
                        </a>
                        
                        <a href="https://instagram.com/" target="_blank" class="hub-link animate__animated animate__fadeInRight delay-3">
                            <i class="fab fa-instagram"></i>
                            Instagram Galereya
                        </a>
                        
                        <a href="https://maps.google.com/" target="_blank" class="hub-link animate__animated animate__fadeInRight delay-4">
                            <i class="fas fa-map-marker-alt"></i>
                            Bizning manzil
                        </a>
                        
                        <a href="tel:+998901234567" class="hub-link animate__animated animate__fadeInRight delay-5">
                            <i class="fas fa-headset"></i>
                            Menejer bilan bog'lanish
                        </a>
                        
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
