<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Spoon Gallery | Organic Luxury</title>

    <!-- Google Fonts for Spa/Retreat Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-linen: #f4efe9; /* Warm, earthy beige */
            --text-olive: #2b3a2e; /* Deep sage/olive green */
            --accent-gold: #bda376; /* Antique muted gold */
            --glass-bg: rgba(244, 239, 233, 0.6); /* Warm tinted glass */
            --glass-border: rgba(255, 255, 255, 0.5);
            --btn-bg: rgba(255, 255, 255, 0.9);
            --btn-hover-bg: #2b3a2e;
            --btn-hover-text: #f4efe9;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-linen);
            color: var(--text-olive);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 3rem 1rem;
        }

        /* Subtle organic background gradient */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(189, 163, 118, 0.05), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(43, 58, 46, 0.05), transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container */
        .hub-container {
            width: 100%;
            max-width: 550px;
            z-index: 10;
        }

        /* Organic Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px; /* Softer, rounder corners */
            padding: 4rem 3rem;
            box-shadow: 0 20px 50px rgba(43, 58, 46, 0.05);
            text-align: center;
            position: relative;
        }

        /* Profile Area */
        .profile-img-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            background: #fff;
            padding: 4px;
            box-shadow: 0 10px 25px rgba(189, 163, 118, 0.2);
            border: 1px solid rgba(189, 163, 118, 0.3);
            transition: transform 0.6s ease;
        }
        .profile-img-wrap:hover {
            transform: scale(1.05);
        }
        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .brand-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-olive);
            letter-spacing: 1px;
        }

        .status-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-olive);
            opacity: 0.8;
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Divider */
        .divider {
            width: 40px;
            height: 1px;
            background-color: var(--accent-gold);
            margin: 0 auto 2.5rem;
            opacity: 0.6;
        }

        /* Link Buttons */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .hub-link {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--btn-bg);
            border: 1px solid rgba(43, 58, 46, 0.1);
            color: var(--text-olive);
            text-decoration: none;
            padding: 1.2rem 1.5rem;
            border-radius: 100px; /* Pill shape for organic feel */
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }

        .hub-link:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(43, 58, 46, 0.15);
            border-color: var(--btn-hover-bg);
        }

        .hub-link i {
            position: absolute;
            left: 25px;
            font-size: 1.1rem;
            color: var(--accent-gold);
            transition: color 0.4s ease;
        }

        .hub-link:hover i {
            color: var(--btn-hover-text);
        }

        /* Slower animations for Spa vibe */
        .animate__animated {
            --animate-duration: 1.2s;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .glass-card {
                padding: 3rem 1.5rem;
                border-radius: 30px;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .hub-link {
                padding: 1.1rem 1.2rem;
                font-size: 0.95rem;
            }
            .hub-link i {
                left: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <div class="hub-container">
        <div class="glass-card animate__animated animate__fadeIn">
            
            <!-- Profile Info -->
            <div class="profile-area">
                <div class="profile-img-wrap">
                    <img src="logo.png" alt="Ali Spoon Logo" onerror="this.src='https://ui-avatars.com/api/?name=Ali+Spoon&background=f4efe9&color=bda376&size=200'">
                </div>
                <h1 class="brand-title">Ali Spoon Gallery</h1>
                <p class="status-text">Premium Oshxona Anjomlari</p>
                <div class="divider"></div>
            </div>

            <!-- Links Area -->
            <div class="links-wrapper">
                
                <a href="#" class="hub-link animate__animated animate__fadeInUp delay-1">
                    <i class="fas fa-book-open"></i>
                    Raqamli Katalog
                </a>
                
                <a href="https://t.me/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-2">
                    <i class="fab fa-telegram-plane"></i>
                    Telegram Orqali Buyurtma
                </a>
                
                <a href="https://instagram.com/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-3">
                    <i class="fab fa-instagram"></i>
                    Instagram Galereya
                </a>
                
                <a href="https://maps.google.com/" target="_blank" class="hub-link animate__animated animate__fadeInUp delay-4">
                    <i class="fas fa-map-marker-alt"></i>
                    Bizning Manzil (Abu Saxiy)
                </a>
                
                <a href="tel:+998901234567" class="hub-link animate__animated animate__fadeInUp delay-5">
                    <i class="fas fa-phone-alt"></i>
                    Menejer Bilan Bog'lanish
                </a>
                
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
